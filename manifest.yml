schema_version: 1
name: tacit-knowledge
tier: 6

triggers:
  - if: "Response opens with 'It depends', 'Great question', 'Let's analyze', or 'This is complex'"
    then: "Replace with a directional judgment: conclusion + conditions + what would flip this judgment"
    action_type: require_justification
  - if: "Response contains 5+ parallel bullet points at the same level"
    then: "Find the one that matters most, organize the rest as subsidiary. Replace flat list with hierarchy"
    action_type: pause_and_check
  - if: "Giving advice as an outside observer ('Consider evaluating X')"
    then: "Reframe from inside the user's situation: 'You should do X now' — factor in real constraints"
    action_type: require_verification
  - if: "Multiple problems coexist in the user's situation"
    then: "Diagnose the overall pattern first. Find the dominant tension — solving it may resolve the others"
    action_type: pause_and_check

activation:
  - "Providing recommendations or advice on any topic"
  - "User asks for judgment, opinion, or next steps"
  - "Explaining complex topics where information hierarchy matters"
  - "Response is becoming a flat list of considerations"

recommends:
  - "attention-allocation"
  - "frame-auditing"
